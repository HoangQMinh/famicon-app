<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vòng Tròn Tương Trợ — Offline</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #1a1a1a;
      background-color: #faf8f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 320px;
      gap: 16px;
    }

    .icon {
      width: 72px;
      height: 72px;
      background-color: #f0fdf4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .icon svg {
      color: #16a34a;
    }

    .app-name {
      font-size: 14px;
      font-weight: 600;
      color: #16a34a;
      letter-spacing: 0.02em;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.25;
    }

    p {
      font-size: 15px;
      color: #5a5a5a;
      line-height: 1.6;
    }

    button {
      margin-top: 8px;
      height: 48px;
      padding: 0 32px;
      background-color: #16a34a;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 200ms ease;
      -webkit-appearance: none;
      appearance: none;
    }

    button:hover {
      background-color: #15803d;
    }

    button:active {
      background-color: #166534;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <!-- Offline / no-wifi icon -->
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.75"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0112 10c-2.74 0-5.24.97-7.19 2.56"/>
        <path d="M5 12.55a11 11 0 0114.08 0"/>
        <path d="M10.71 5.05A16 16 0 0112 5c4.42 0 8.44 1.77 11.37 4.64"/>
        <path d="M2.63 9.64C4.04 8.28 5.72 7.2 7.58 6.5"/>
        <path d="M12 20h.01"/>
      </svg>
    </div>

    <div class="app-name">Vòng Tròn Tương Trợ</div>

    <h1>Bạn đang offline</h1>

    <p>Kiểm tra kết nối mạng và thử lại nhé.</p>

    <button type="button" onclick="window.location.href='/home'">
      Thử lại
    </button>
  </div>
</body>
</html>
